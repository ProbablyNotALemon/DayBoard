<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>DayBoard</title>

<link rel="manifest" href="manifest.json">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">

<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="sidebar">
  <div class="logo">DayBoard</div>
  <div class="menu">Home</div>
  <div class="menu">Weather</div>
  <div class="menu">Reminders</div>
</div>

<div class="main">

  <div class="topbar">
    <div id="timeSmall"></div>
  </div>

  <div class="grid">

    <div class="card large clock" id="clockCard">
      <div id="time">--:--</div>
      <div id="date"></div>
    </div>

    <div class="card weather">
      <div class="title">Weather</div>
      <div id="weather">Loading...</div>
    </div>

    <div class="card reminders">
      <div class="title">Reminders</div>
      <ul id="reminderList"></ul>
      <input id="reminderInput" placeholder="Add reminder..." />
    </div>

    <div class="card battery">
      <div class="title">Battery</div>
      <div id="battery">--%</div>
    </div>

  </div>
</div>

<!-- LOCK SCREEN -->
<div id="lockScreen" class="lockscreen hidden">
  <div id="lockTime" class="lock-time"></div>
  <div id="lockDate" class="lock-date"></div>
</div>

<script src="script.js"></script>
</body>
</html>
