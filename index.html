<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DayBoard</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="app">

  <aside class="sidebar">
    <div id="timeSmall"></div>

    <div class="menu active" data-page="home">Home</div>
    <div class="menu" data-page="weather">Weather</div>
    <div class="menu" data-page="reminders">Reminders</div>
    <div class="menu" data-page="notes">Notes</div>
    <div class="menu" data-page="settings">Settings</div>
  </aside>

  <main class="content">

    <!-- HOME -->
    <section class="page active" id="home">
      <div class="clock" id="clockCard">
        <div id="time"></div>
        <div id="date"></div>
      </div>
    </section>

    <!-- WEATHER -->
    <section class="page" id="weather">
      <div class="card">
        <h2>Weather</h2>
        <div id="weatherText">Loading...</div>
      </div>
    </section>

    <!-- REMINDERS -->
    <section class="page" id="reminders">
      <div class="card">
        <h2>Reminders</h2>
        <ul id="reminderList"></ul>
        <input id="reminderInput" placeholder="Add reminder and press Enter">
      </div>
    </section>

    <!-- NOTES -->
    <section class="page" id="notes">
      <div class="card">
        <h2>Notes</h2>
        <textarea id="notesArea"></textarea>
        <button id="clearNotes">Clear Notes</button>
      </div>
    </section>

    <!-- SETTINGS -->
    <section class="page" id="settings">
      <div class="card">
        <h2>Settings</h2>
        <label>Screen saver delay (minutes)</label>
        <input type="number" id="ssTime" value="2" min="1" max="30">
      </div>
    </section>

  </main>
</div>

<!-- LOCK SCREEN -->
<div id="lockScreen" class="lock hidden">
  <div id="lockTime"></div>
  <div id="lockDate"></div>
</div>

<!-- SCREENSAVER -->
<div id="screensaver" class="screensaver hidden">
  <div class="glow"></div>
  <div id="screenTime"></div>
</div>

<script src="script.js"></script>
</body>
</html>
