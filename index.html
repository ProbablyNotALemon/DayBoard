<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>DayBoard</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="layout">

  <aside class="sidebar">
    <div class="timeSmall" id="timeSmall"></div>
    <div class="menu active">Home</div>
    <div class="menu">Weather</div>
    <div class="menu">Reminders</div>
    <div class="menu">Notes</div>
    <div class="menu">Settings</div>
  </aside>

  <main class="content">

    <div class="card clock" id="clockCard">
      <div id="time">--:--</div>
      <div id="date"></div>
    </div>

    <div class="card reminders">
      <h3>Reminders</h3>
      <ul id="reminderList"></ul>
      <input id="reminderInput" placeholder="Add reminder...">
    </div>

    <div class="card notes">
      <h3>Notes</h3>
      <textarea placeholder="Tap to write something down..."></textarea>
    </div>

    <div class="card quicklinks">
      <h3>Quick Links</h3>
      <div class="links">
        <a href="https://google.com">Google</a>
        <a href="https://youtube.com">YouTube</a>
        <a href="https://drive.google.com">Drive</a>
        <a href="#">Add</a>
      </div>
    </div>

  </main>
</div>

<!-- Lock screen -->
<div id="lockScreen" class="lockscreen hidden">
  <div id="lockTime" class="lock-time"></div>
  <div id="lockDate" class="lock-date"></div>
</div>

<script src="script.js"></script>
</body>
</html>
